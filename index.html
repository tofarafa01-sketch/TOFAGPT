<!DOCTYPE html>
<html>
<head>
<title>TofaGPT</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
margin:0;
}

h1{
margin-top:20px;
}

#chat{
width:600px;
height:400px;
background:#020617;
border-radius:10px;
padding:20px;
overflow-y:auto;
margin-top:20px;
}

.message{
margin-bottom:15px;
}

.user{
color:#22c55e;
}

.ai{
color:#38bdf8;
}

#inputArea{
margin-top:20px;
}

input{
padding:12px;
width:400px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

</style>
</head>

<body>

<h1>🤖 TofaGPT</h1>

<div id="chat"></div>

<div id="inputArea">

<input id="question" placeholder="Ask TofaGPT...">

<button onclick="ask()">Send</button>

</div>

<script>

async function ask(){

let q = document.getElementById("question").value;

if(q=="") return;

let chat = document.getElementById("chat");

chat.innerHTML += "<div class='message user'>You: "+q+"</div>";

document.getElementById("question").value="";

let res = await fetch("http://localhost:3000/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:q})
});

let data = await res.json();

chat.innerHTML += "<div class='message ai'>TofaGPT: "+data.answer+"</div>";

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
