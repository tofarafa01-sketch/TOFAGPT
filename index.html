<!DOCTYPE html>
<html>
<head>
<title>TofaGPT</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:60px;
}

h1{
font-size:40px;
}

input{
padding:12px;
width:300px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
}

#response{
margin-top:30px;
font-size:18px;
color:#38bdf8;
}
</style>

</head>

<body>

<h1>🤖 TofaGPT</h1>
<p>Ask anything and get smart answers</p>

<input id="question" placeholder="Ask TofaGPT something...">
<button onclick="ask()">Ask</button>

<div id="response"></div>

<script>

function ask(){
let q=document.getElementById("question").value;

if(q==""){
alert("Type a question");
return;
}

document.getElementById("response").innerHTML="Thinking about: "+q;

}

</script>

</body>
</html>
